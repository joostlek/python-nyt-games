---
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: 🐶 Ruff Linter
        language: system
        types: [python]
        entry: uv run ruff check --fix
        require_serial: true
        stages: [commit, push, manual]
      - id: ruff-format
        name: 🐶 Ruff Formatter
        language: system
        types: [python]
        entry: uv run ruff format
        require_serial: true
        stages: [commit, push, manual]
      - id: check-ast
        name: 🐍 Check Python AST
        language: system
        types: [python]
        entry: uv run check-ast
      - id: check-docstring-first
        name: ℹ️  Check docstring is first
        language: system
        types: [python]
        entry: uv run check-docstring-first
      - id: codespell
        name: ✅ Check code for common misspellings
        language: system
        types: [text]
        exclude: ^uv\.lock$
        entry: uv run codespell
        args:
          - --ignore-words-list=activite
      - id: mypy
        name: 🆎 Static type checking using mypy
        language: system
        types: [python]
        entry: uv run mypy
        require_serial: true
      - id: prettier
        name: 💄 Ensuring files are prettier
        language: system
        types: [yaml, json, markdown]
        entry: npm run prettier
        pass_filenames: false
      - id: pylint
        name: 🌟 Starring code with pylint
        language: system
        types: [python]
        entry: uv run pylint
      - id: pytest
        name: 🧪 Running tests and test coverage with pytest
        language: system
        types: [python]
        entry: uv run pytest
        pass_filenames: false
      - id: yamllint
        name: 🎗  Check YAML files with yamllint
        language: system
        types: [yaml]
        entry: uv run yamllint
  - repo: builtin
    hooks:
      - id: check-case-conflict
        name: 🔠 Check for case conflicts
      - id: check-executables-have-shebangs
        name: 🧐 Check that executables have shebangs
        stages: [pre-commit, pre-push, manual]
      - id: check-json
        name: ｛ Check JSON files
      - id: check-merge-conflict
        name: 💥 Check for merge conflicts
      - id: check-symlinks
        name: 🔗 Check for broken symlinks
      - id: check-toml
        name: ✅ Check TOML files
      - id: check-xml
        name: ✅ Check XML files
      - id: check-yaml
        name: ✅ Check YAML files
      - id: detect-private-key
        name: 🕵️  Detect Private Keys
      - id: end-of-file-fixer
        name: ⮐  Fix End of Files
        stages: [pre-commit, pre-push, manual]
      - id: no-commit-to-branch
        name: 🛑 Don't commit to main branch
        args:
          - --branch=main
      - id: trailing-whitespace
        name: ✄  Trim Trailing Whitespace
        stages: [pre-commit, pre-push, manual]
